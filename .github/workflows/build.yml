name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          test -f haval-h3-dashboard-card.js
          grep "1.2.1" haval-h3-dashboard-card.js
          ls -lh haval-h3-dashboard-card.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: haval-h3-dashboard-card
          path: haval-h3-dashboard-card.js

  release:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: haval-h3-dashboard-card
          path: .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: haval-h3-dashboard-card.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
