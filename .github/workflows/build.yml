name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check version sync
        run: npm run check:version

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          test -f haval-h3-dashboard-card.js
          VERSION=$(node -p "require('./package.json').version")
          grep "$VERSION" haval-h3-dashboard-card.js
          grep "data:image/png;base64" haval-h3-dashboard-card.js
          ls -lh haval-h3-dashboard-card.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: haval-h3-dashboard-card
          path: haval-h3-dashboard-card.js
