name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check version sync
        run: npm run check:version

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          test -f haval-h3-dashboard-card.js
          VERSION=$(node -p "require('./package.json').version")
          grep "$VERSION" haval-h3-dashboard-card.js
          grep "data:image/png;base64" haval-h3-dashboard-card.js
          ls -lh haval-h3-dashboard-card.js

      - name: Read package version
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload JS to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          files: haval-h3-dashboard-card.js
